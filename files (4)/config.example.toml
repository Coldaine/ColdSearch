# Example configuration — format is TBD (TOML used here as placeholder)
# This file is the sole authority on provider mapping and key allocation.
# Changing this file never requires a code change or rebuild.

[capabilities.basic_search]
providers = ["brave", "tavily", "exa"]
fanout = "all"                    # "all" = hit every mapped provider; or a number
rerank = true

[capabilities.extract]
providers = ["firecrawl"]
fanout = 1
rerank = false

# Each provider has one or more API keys.
# The layer rotates through them per-request.

[providers.brave]
keys = [
  "BRAVE_API_KEY_1",
  "BRAVE_API_KEY_2",
]

[providers.tavily]
keys = [
  "TAVILY_API_KEY_1",
  "TAVILY_API_KEY_2",
  "TAVILY_API_KEY_3",
]

[providers.exa]
keys = [
  "EXA_API_KEY_1",
]

[providers.firecrawl]
keys = [
  "FIRECRAWL_API_KEY_1",
]

# Keys reference env vars. The layer resolves them at runtime.
# Never put raw API keys in this file.

[agent]
# Mode 2 config — search agent settings
model = "TBD"
max_steps = 5
