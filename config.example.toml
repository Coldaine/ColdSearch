# Example configuration for usearch
# Copy to ~/.config/usearch/config.toml and customize

[capabilities.basic_search]
# Providers that back the basic_search capability, in preference order
# Phase 1: Single provider (Tavily)
providers = ["tavily"]

[providers.tavily]
[providers.tavily.keyPool]
# Key references - supports env: prefix for environment variables
keys = ["env:TAVILY_API_KEY"]
# Rotation strategy (optional, defaults to round-robin)
strategy = "round-robin"

