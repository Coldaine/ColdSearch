# Example configuration for usearch
# Copy to ~/.config/usearch/config.toml and customize

[capabilities.basic_search]
# Providers that back the basic_search capability, in preference order
# Mode 1 (Fanout): All providers are queried in parallel
providers = ["tavily", "brave", "exa", "serper"]

[providers.tavily]
[providers.tavily.keyPool]
keys = ["env:TAVILY_API_KEY"]
strategy = "round-robin"

[providers.brave]
[providers.brave.keyPool]
keys = ["env:BRAVE_API_KEY"]
strategy = "round-robin"

[providers.exa]
[providers.exa.keyPool]
keys = ["env:EXA_API_KEY"]
strategy = "round-robin"

[providers.serper]
[providers.serper.keyPool]
keys = ["env:SERPER_API_KEY"]
strategy = "round-robin"

# For Mode 2 (Search Agent), set one of these:
# ANTHROPIC_API_KEY - for Claude models (default)
# OPENAI_API_KEY - for OpenAI models
