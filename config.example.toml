# Example configuration for coldsearch
# Copy to ~/.config/coldsearch/config.toml and customize
# The runtime also falls back to ~/.config/usearch/config.toml for compatibility.

# ============================================
# CAPABILITY CONFIGURATION
# ============================================
# Each capability maps to one or more providers.
# strategy = "random"  → Pick one random provider per request
# strategy = "all"     → Fan out to all providers (for search with reranking)

[capabilities.search]
# Search across the web - 5 providers with random selection
providers = ["searxng", "tavily", "exa", "brave", "serper"]
strategy = "random"

[capabilities.extract]
# Extract content from URLs - 3 providers with random selection
providers = ["tavily", "exa", "jina"]
strategy = "random"

[capabilities.crawl]
# Crawl websites - 2 providers with random selection
providers = ["tavily", "firecrawl"]
strategy = "random"

# ============================================
# PROVIDER CONFIGURATION
# ============================================
# Each provider has its own key pool.
# strategy = "random"      → Pick random key per request
# strategy = "round-robin" → Cycle through keys (default)
#
# Key reference formats:
#   env:VAR_NAME              → Environment variable
#   bws:SECRET_NAME           → Bitwarden Secrets Manager (by name)
#   bws:SECRET_UUID           → Bitwarden Secrets Manager (by ID)

[providers.searxng]
[providers.searxng.keyPool]
# SearXNG is self-hosted / operator-managed and doesn't require an API key.
keys = []
strategy = "round-robin"

[providers.searxng.options]
# Required unless SEARXNG_BASE_URL is provided in the environment.
# Do not assume localhost on this machine.
baseUrl = "https://search.example.internal"

[providers.tavily]
[providers.tavily.keyPool]
# Multiple Tavily keys for load balancing
# Environment variables:
keys = ["env:TAVILY_API_KEY_1", "env:TAVILY_API_KEY_2"]
# OR Bitwarden Secrets Manager:
# keys = ["bws:tavily-api-key-prod", "bws:tavily-api-key-backup"]
strategy = "random"

[providers.exa]
[providers.exa.keyPool]
keys = ["env:EXA_API_KEY"]
# OR: keys = ["bws:exa-api-key"]

[providers.brave]
[providers.brave.keyPool]
keys = ["env:BRAVE_API_KEY"]
# OR: keys = ["bws:brave-api-key"]

[providers.serper]
[providers.serper.keyPool]
keys = ["env:SERPER_API_KEY"]
# OR: keys = ["bws:serper-api-key"]

[providers.jina]
[providers.jina.keyPool]
# Jina AI Reader doesn't require an API key for basic usage
keys = []

[providers.firecrawl]
[providers.firecrawl.keyPool]
keys = ["env:FIRECRAWL_API_KEY"]
# OR: keys = ["bws:firecrawl-api-key"]

# ============================================
# BITWARDEN SECRETS MANAGER SETUP
# ============================================
# Required environment variables for BWS:
#   BWS_ACCESS_TOKEN      → Machine account access token
#   BWS_ORGANIZATION_ID   → Your Bitwarden organization ID (for name lookups)
#
# Get your access token:
#   1. Go to Bitwarden Admin Console → Machine Accounts
#   2. Create machine account, assign to projects
#   3. Generate access token
#
# Get organization ID:
#   bws organization list

# ============================================
# USAGE EXAMPLES
# ============================================
# 
# Search (random provider from 4, random key):
#   coldsearch search "machine learning"
#
# Extract (random provider from 3):
#   coldsearch extract "https://example.com/article"
#
# Crawl (random provider from 2):
#   coldsearch crawl "https://docs.example.com"
#
# Force specific provider:
#   coldsearch search --providers tavily "query"
#
# Force single provider mode explicitly:
#   coldsearch search --single-provider "query"

# ============================================
# USAGE LOGGING (OPTIONAL)
# ============================================
# Usage logs are written as JSONL for operational visibility.
# Default: ~/.config/coldsearch/usage.jsonl
#
#[logging.usage]
#path = "~/.config/coldsearch/usage.jsonl"
